<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Greek Cards Scatter</title>

  <!-- external styles -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="table"></div>

  <div id="overlay">
    <div class="modal">
      <div class="greek" id="modalGreek"></div>
      <div id="modalTranslation"></div>
      <div class="buttons">
        <button class="btn green" data-grade="green">✓</button>
        <button class="btn yellow" data-grade="yellow">~</button>
        <button class="btn red" data-grade="red">✗</button>
      </div>
    </div>
  </div>

  <script src="masculine_words.js"></script>
  <script>
    const words = window.Words || [];

    const table = document.getElementById('table');
    const overlay = document.getElementById('overlay');
    const modalGreek = document.getElementById('modalGreek');
    const modalTranslation = document.getElementById('modalTranslation');

    const TABLE_SIZE = 15;

    let unseen = [...words];
    let processed = [];
    let activeCard = null;

    const tintMap = {
      green: '#CCFFCC',
      yellow: '#FFF5CC',
      red: '#FFCCCC'
    };

    function rand(min, max) { return Math.random() * (max - min) + min; }

    function getCardSize() {
      const isMobile = window.innerWidth < 600;
      return isMobile ? { w: 140, h: 70 } : { w: 200, h: 100 };
    }

    function createCard(item, tint=null) {
      const { w, h } = getCardSize();

      const card = document.createElement('div');
      card.className = 'card';
      card.style.width = w + 'px';
      card.style.height = h + 'px';

      if (tint) card.style.background = tint;

      card.innerHTML = `<div class="greek">${item.greek}</div>`;

      card.addEventListener('click', (e) => {
        const el = document.elementFromPoint(e.clientX, e.clientY);
        const topCard = el?.closest('.card');
        if (topCard !== card) return;

        activeCard = { el: card, item };
        modalGreek.textContent = item.greek;
        modalTranslation.textContent = item.translation;
        overlay.style.display = 'flex';
      });

      return card;
    }

    function scatter(batch) {
      table.innerHTML = '';
      const w = window.innerWidth;
      const h = window.innerHeight;
      const size = getCardSize();

      batch.forEach(entry => {
        const card = createCard(entry.item || entry, entry.tint);
        card.style.left = rand(0, w - size.w) + 'px';
        card.style.top = rand(0, h - size.h) + 'px';
        card.style.transform = `rotate(${rand(-90, 90)}deg)`;
        card.style.zIndex = Math.floor(Math.random() * 10000);
        table.appendChild(card);
      });
    }

    function pickFromUnseen(n) {
      const res = [];
      while (res.length < n && unseen.length > 0) {
        const idx = Math.floor(Math.random() * unseen.length);
        res.push(unseen.splice(idx, 1)[0]);
      }
      return res;
    }

    function buildNextBatch() {
      const next = [];

      processed.forEach(p => { if (p.grade !== 'green') next.push(p); });

      processed.forEach(p => {
        if (p.grade === 'green' && Math.random() < 0.4) next.push(p);
      });

      const need = Math.max(0, TABLE_SIZE - next.length);
      const fresh = pickFromUnseen(need);
      fresh.forEach(item => next.push(item));

      processed = [];
      return next;
    }

    function handleGrade(grade) {
      if (!activeCard) return;

      processed.push({ item: activeCard.item, grade, tint: tintMap[grade] });

      activeCard.el.remove();
      activeCard = null;
      overlay.style.display = 'none';

      if (table.children.length === 0) {
        const next = buildNextBatch();
        setTimeout(() => scatter(next), 200);
      }
    }

    function init() {
      const initial = pickFromUnseen(TABLE_SIZE);
      scatter(initial);
    }

    document.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('click', () => handleGrade(btn.dataset.grade));
    });

    init();
  </script>
</body>
</html>
