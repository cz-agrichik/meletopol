<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Greek Cards Scatter</title>

  <!-- external styles -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="table"></div>
  <div id="stats"></div>

  <div id="overlay">
    <div class="modal">
      <div class="greek" id="modalGreek"></div>
      <div id="modalTranslation"></div>
      <div class="buttons">
        <button class="btn green" data-grade="green">✓</button>
        <button class="btn yellow" data-grade="yellow">~</button>
        <button class="btn red" data-grade="red">✗</button>
      </div>
    </div>
  </div>

  <script src="a1_words.js"></script>
  <script> 
    const words = window.Words || [];

    const table = document.getElementById('table');
    const overlay = document.getElementById('overlay');
    const modalGreek = document.getElementById('modalGreek');
    const modalTranslation = document.getElementById('modalTranslation');

    const TABLE_SIZE = 22;
    const DUE_AFTER_MS = 10 * 60 * 1000; //
    const EDGE_PADDING = 80;

    let unseen = [...words];
    let processed = [];
    let activeCard = null;
    const STORAGE_KEY = 'greek_cards_progress';
    let progress = {};

    const tintMap = {
      green: '#CCFFCC',
      yellow: '#FFF5CC',
      red: '#FFCCCC'
    };

    const statsEl = document.getElementById('stats');

    function rand(min, max) { return Math.random() * (max - min) + min; }

    function getCardSize() {
      const isMobile = window.innerWidth < 600;
      return isMobile ? { w: 140, h: 70 } : { w: 200, h: 100 };
    }

    function createCard(item, tint=null) {
      const { w, h } = getCardSize();

      const card = document.createElement('div');
      card.className = 'card';
      card.style.width = w + 'px';
      card.style.height = h + 'px';

      if (tint) card.style.background = tint;

      card.innerHTML = `<div class="greek">${item.greek}</div>`;

      card.addEventListener('click', (e) => {
        const el = document.elementFromPoint(e.clientX, e.clientY);
        const topCard = el?.closest('.card');
        if (topCard !== card) return;

        activeCard = { el: card, item };
        modalGreek.textContent = item.greek;
        modalTranslation.textContent = item.translation;
        overlay.style.display = 'flex';
      });

      return card;
    }

    function scatter(batch) {
      table.innerHTML = '';
      const w = window.innerWidth;
      const h = window.innerHeight;
      const size = getCardSize();

      batch.forEach(entry => {
        const card = createCard(entry.item || entry, entry.tint);
        card.style.left = rand(
          EDGE_PADDING,
          w - size.w - EDGE_PADDING
        ) + 'px';

        card.style.top = rand(
          EDGE_PADDING,
          h - size.h - EDGE_PADDING
        ) + 'px';
        card.style.transform = `rotate(${rand(-50, 50)}deg)`;
        card.style.zIndex = Math.floor(Math.random() * 10000);
        table.appendChild(card);
      });
    }

    function getDueCards() {
      const now = Date.now();

      return words.filter(item => {
        const p = progress[item.greek];
        if (!p) return false;

        return (
          (p.depth ?? 1) === 1 &&
          now - (p.timestamp ?? 0) > DUE_AFTER_MS
        );
      });
    }

    function pickNewCards(n, excludeSet = new Set()) {
      const fresh = words.filter(item => {
        return !progress[item.greek] && !excludeSet.has(item.greek);
      });

      const res = [];

      while (res.length < n && fresh.length > 0) {
        const idx = Math.floor(Math.random() * fresh.length);
        res.push(fresh.splice(idx, 1)[0]);
      }

      return res;
    }

    function buildNextBatch() {
      const next = [];

      processed.forEach(p => {
        if (p.grade !== 'green') next.push(p);
      });

      const used = new Set(
        next.map(entry => (entry.item || entry).greek)
      );

      const due = getDueCards()
        .filter(item => !used.has(item.greek))
        .sort(() => Math.random() - 0.5);

      while (next.length < TABLE_SIZE && due.length > 0) {
        const item = due.shift();
        used.add(item.greek);
        next.push({
          item,
          tint: tintMap.green
        });
      }

      const need = TABLE_SIZE - next.length;

      if (need > 0) {
        const fresh = pickNewCards(need, used);
        fresh.forEach(item => next.push(item));
      }

      processed = [];
      return next;
    }

    function handleGrade(grade) {
      if (!activeCard) return;

      processed.push({ item: activeCard.item, grade, tint: tintMap[grade] });

      const key = activeCard.item.greek;
      const now = Date.now();

      const wasInProgress = !!progress[key];

      if (grade === 'green') {
        if (wasInProgress) {
          progress[key] = {
            depth: (progress[key].depth ?? 1) + 1,
            timestamp: now
          };
        } else {
          progress[key] = {
            depth: 1,
            timestamp: now
          };
        }
      } else if (wasInProgress) {
        delete progress[key];
      }

      saveProgress();
      updateStats();

      activeCard.el.remove();
      activeCard = null;
      overlay.style.display = 'none';

      if (table.children.length === 0) {
        const next = buildNextBatch();
        setTimeout(() => scatter(next), 200);
      }
    }

    function loadProgress() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;

      try {
        progress = JSON.parse(raw) || {};
      } catch {
        progress = {};
      }
    }

    function updateStats() {
      const total = words.length;
      const learned = Object.keys(progress).length;
      const unseen = total - learned;

      statsEl.textContent = `Learned ${learned} / Unseen ${unseen}`;
    }

    function saveProgress() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
    }

    function init() {
      loadProgress();

      const initial = buildNextBatch();
      scatter(initial);
      updateStats();
    }

    document.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('click', () => handleGrade(btn.dataset.grade));
    });

    init();
  </script>
</body>
</html>
