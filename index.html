<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Greek Cards Scatter</title>
  <style>
    :root { --card-w: 200px; --card-h: 100px; }
    body { margin:0; background:#1e1e1e; font-family:Arial, sans-serif; overflow:hidden; }
    #table { position:relative; width:100vw; height:100vh; background:#2e6b4b; }
    .card {
      position:absolute; width:var(--card-w); height:var(--card-h);
      background:#fffdf8; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.3);
      display:flex; align-items:center; justify-content:center; cursor:pointer;
      transform-origin:center; padding:8px; transition:background .3s;
    }
    .greek { font-size:22px; font-weight:bold; text-align:center; }

    #overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items:center; justify-content:center; z-index:99999; }
    .modal { background:white; color:black; padding:20px; border-radius:16px; width:300px; text-align:center; }
    .buttons { display:flex; gap:10px; justify-content:center; margin-top:20px; }
    .btn { flex:1; padding:10px; border:none; border-radius:8px; cursor:pointer; }
    .green { background:#4caf50; color:white; }
    .yellow { background:#ffc107; }
    .red { background:#f44336; color:white; }
  </style>
</head>
<body>
  <div id="table"></div>

  <div id="overlay">
    <div class="modal">
      <div class="greek" id="modalGreek"></div>
      <div id="modalTranslation"></div>
      <div class="buttons">
        <button class="btn green" data-grade="green">✓</button>
        <button class="btn yellow" data-grade="yellow">~</button>
        <button class="btn red" data-grade="red">✗</button>
      </div>
    </div>
  </div>

  <script src="masculine_words.js"></script>
  <script>
    const words = window.Words || [];

    const table = document.getElementById('table');
    const overlay = document.getElementById('overlay');
    const modalGreek = document.getElementById('modalGreek');
    const modalTranslation = document.getElementById('modalTranslation');

    const TABLE_SIZE = 5;

    let unseen = [...words];
    let processed = [];
    let activeCard = null;

    const tintMap = {
      green: '#CCFFCC',
      yellow: '#FFF5CC',
      red: '#FFCCCC'
    };

    function rand(min, max) { return Math.random() * (max - min) + min; }

    function createCard(item, tint=null) {
      const card = document.createElement('div');
      card.className = 'card';
      if (tint) card.style.background = tint;
      card.innerHTML = `<div class="greek">${item.greek}</div>`;

      card.addEventListener('click', (e) => {
        const el = document.elementFromPoint(e.clientX, e.clientY);
        const topCard = el?.closest('.card');
        if (topCard !== card) return;

        activeCard = { el: card, item };
        modalGreek.textContent = item.greek;
        modalTranslation.textContent = item.translation;
        overlay.style.display = 'flex';
      });

      return card;
    }

    function scatter(batch) {
      table.innerHTML = '';
      const w = window.innerWidth;
      const h = window.innerHeight;

      batch.forEach(entry => {
        const card = createCard(entry.item || entry, entry.tint);
        card.style.left = rand(0, w - 200) + 'px';
        card.style.top = rand(0, h - 100) + 'px';
        card.style.transform = `rotate(${rand(-90, 90)}deg)`;
        card.style.zIndex = Math.floor(Math.random() * 10000);
        table.appendChild(card);
      });
    }

    function pickFromUnseen(n) {
      const res = [];
      while (res.length < n && unseen.length > 0) {
        const idx = Math.floor(Math.random() * unseen.length);
        res.push(unseen.splice(idx, 1)[0]);
      }
      return res;
    }

    function buildNextBatch() {
      const next = [];

      // 1) все не-зелёные
      processed.forEach(p => { if (p.grade !== 'green') next.push(p); });

      // 2) зелёные с 40%
      processed.forEach(p => {
        if (p.grade === 'green' && Math.random() < 0.4) next.push(p);
      });

      // 3) добивка новыми
      const need = Math.max(0, TABLE_SIZE - next.length);
      const fresh = pickFromUnseen(need);
      fresh.forEach(item => next.push(item));

      processed = [];
      return next;
    }

    function handleGrade(grade) {
      if (!activeCard) return;

      processed.push({ item: activeCard.item, grade, tint: tintMap[grade] });

      activeCard.el.remove();
      activeCard = null;
      overlay.style.display = 'none';

      if (table.children.length === 0) {
        const next = buildNextBatch();
        setTimeout(() => scatter(next), 200);
      }
    }

    function init() {
      const initial = pickFromUnseen(TABLE_SIZE);
      scatter(initial);
    }

    document.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('click', () => handleGrade(btn.dataset.grade));
    });

    init();
  </script>
</body>
</html>
